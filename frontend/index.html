<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DEEPSHIELD-AI</title>

    <link rel="stylesheet" href="deepshield_style.css">

</head>

<body>

    <!-- PARTICLES -->
    <canvas id="bg"></canvas>

    <!-- MAIN -->
    <div class="main-container">

        <!-- HERO -->
        <div class="hero">

            <h1>
                DEEPSHIELD-AI
            </h1>

            <h2>
                Deepfake Video & Image Detection System
            </h2>

            <p>
                Upload media and analyze authenticity using AI-powered deepfake detection.
            </p>

        </div>

        <!-- MAIN CONTENT -->
        <div class="dashboard">

            <!-- LEFT SIDE -->
            <div class="left-panel">

                <div class="projection-container">

                    <!-- PROJECTOR -->
                    <div class="projector-base"></div>

                    <div class="light-beam"></div>

                    <!-- FACE -->
                    <img
                        src="assets/ai-face.png"
                        id="hologramFace">

                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="analysis-card">

                <!-- PREVIEW -->
                <div class="preview-section">

                    <video
                        id="videoPreview"
                        controls
                        class="hidden">
                    </video>

                    <img
                        id="imagePreview"
                        class="hidden">

                    <div id="placeholder">

                        <div class="placeholder-box">
                            AI Detection Preview
                        </div>

                    </div>

                </div>

                <!-- UPLOAD -->
                <div class="upload-section">

                    <label
                        for="fileInput"
                        class="custom-upload">

                        Upload Image or Video

                    </label>

                    <input
                        type="file"
                        id="fileInput"
                        accept="image/*,video/*"
                        hidden>

                    <div id="fileName">
                        No file selected
                    </div>

                    <button onclick="uploadFile()">
                        Analyze Media
                    </button>

                </div>

                <!-- PROGRESS -->
                <div class="progress-wrapper">

                    <div class="chart">

                        <div class="bar" id="bar"></div>

                    </div>

                    <div id="progressPercent">
                        0%
                    </div>

                </div>

                <!-- PROCESS -->
                <div id="processingText">
                    Waiting for upload...
                </div>

                <!-- RESULT -->
                <div id="resultBox">

                    <div class="result-block">

                        <span class="result-label">
                            Model Confidence
                        </span>

                        <div id="scoreText">
                            0%
                        </div>

                    </div>

                    <div class="result-block">

                        <span class="result-label">
                            Detection Result
                        </span>

                        <div id="finalResult">
                            Waiting
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <footer>

        <hr>

        <p>
            Developed by PRASAD MANOLKAR
        </p>

        <div class="footer-links">

            <a href="https://github.com/Prasad-Manolkar-dev" target="_blank">
                GitHub
            </a>

            <a href="https://linkedin.com/in/prasad-manolkar-11ap" target="_blank">
                LinkedIn
            </a>

        </div>

    </footer>

    <script src="script.js"></script>

</body>

</html>
